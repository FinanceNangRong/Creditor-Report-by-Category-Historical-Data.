<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>13. รายงานเจ้าหนี้แยกประเภท รายตัว ย้อนหลัง</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        html{font-size:100%;}body{font-family:'Noto Sans Thai',sans-serif;background-color:#f3f4f6;}
        .print-only{display:none;}
        @media print{
            @page{size:A4 landscape;margin:10mm;}
            body,html{background-color:white;height:auto!important;overflow:visible!important;display:block!important;}
            .h-screen,.overflow-hidden,.overflow-auto,.overflow-x-auto,.flex-1,main,#printArea,#contentContainer{height:auto!important;overflow:visible!important;display:block!important;position:static!important;margin:0!important;padding:0!important;page-break-inside:auto!important;break-inside:auto!important;}
            .shadow-sm{box-shadow:none!important;}.rounded-lg{border-radius:0!important;}
            .no-print{display:none!important;}.print-only{display:block!important;}.print-full-width{width:100%!important;margin:0!important;padding:0!important;box-shadow:none!important;}
            table{width:100%;border-collapse:collapse;page-break-inside:auto;}tr{page-break-inside:avoid;page-break-after:auto;}thead{display:table-header-group;}tfoot{display:table-footer-group;}
            th,td{border:1px solid #000!important;padding:0.6mm 2px!important;height:0.5mm!important;line-height:1!important;font-size:6.5pt!important;}
            th{background-color:#f3f4f6!important;-webkit-print-color-adjust:exact;font-weight:bold!important;}
            td{font-weight:normal!important;}td.font-medium,td.font-semibold,td.font-bold{font-weight:normal!important;}
            tfoot td{background-color:#f3f4f6!important;-webkit-print-color-adjust:exact;font-weight:bold!important;}
            .print-fixed-table{table-layout:fixed!important;width:100%!important;max-width:100%!important;margin:0 auto!important;}
            .print-fixed-table th,.print-fixed-table td{white-space:normal!important;word-wrap:break-word!important;overflow-wrap:break-word!important;}
            .print-truncate{white-space:nowrap!important;overflow:hidden!important;text-overflow:ellipsis!important;word-wrap:normal!important;overflow-wrap:normal!important;}
            tbody.page-break-before{page-break-before:always!important;break-before:page!important;}
        }
        ::-webkit-scrollbar{width:8px;height:8px;}::-webkit-scrollbar-track{background:#f1f1f1;}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px;}::-webkit-scrollbar-thumb:hover{background:#94a3b8;}
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">
    <header class="bg-blue-800 text-white p-4 shadow-md no-print shrink-0 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <a href="https://financenangrong.github.io/financial-system/" class="text-white hover:bg-blue-700 focus:outline-none p-2 rounded transition-colors flex items-center gap-1" title="ย้อนกลับ">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                <span class="hidden sm:inline font-medium text-sm">ย้อนกลับ</span>
            </a>
            <h1 class="text-2xl font-bold">13. รายงานเจ้าหนี้แยกประเภท รายตัว ย้อนหลัง</h1>
        </div>
        <div id="statusBadge" class="text-sm px-3 py-1 rounded-full bg-yellow-100 text-yellow-800 font-medium flex items-center gap-2">พร้อมใช้งาน</div>
    </header>
    <main class="flex-1 bg-white overflow-auto p-6 print-full-width" id="printArea">
        <div id="contentContainer" class="max-w-7xl mx-auto"></div>
    </main>

    <script>
        const HISTORY_SHEET_CSV_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vSMQ_KJlIyAnZJJYKMjKqKWaM226gI8W00KBx7fUBvUFh6JC5RXNL2Ix28rLR7dZA/pub?output=csv";
        let appData7H=[], historyList7H=[], selectedHistoryUrl7H="", isLoadingHistory7H=false, isLoadingData7H=false;
        let selectedCategories_forReport7H=[], currentAvailableCategories7H=[], report7HDropdownOpen=false;
        let startDate_receive_forReport7H="", endDate_receive_forReport7H="", startDate_pay_forReport7H="", endDate_pay_forReport7H="";

        function parseNumberValue(v){if(!v)return 0;if(typeof v==='string')v=v.replace(/,/g,'');const n=parseFloat(v);return isNaN(n)?0:n;}
        function formatNumber(n){const v=parseFloat(n);return (isNaN(v)||v===0)?'0.00':v.toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2});}
        function extractUrlFromEmbed(str) { let url = String(str).trim(); if (url.toLowerCase().includes('<iframe') && url.includes('src=')) { const match = url.match(/src=["'](.*?)["']/); if (match && match[1]) url = match[1]; } return url.replace(/&amp;/g, '&'); }
        function getThaiMonthYear(mm_yyyy) { if (!mm_yyyy || typeof mm_yyyy !== 'string') return mm_yyyy; const parts = mm_yyyy.split('/'); if (parts.length === 2) { const m = parseInt(parts[0], 10) - 1; const y = parts[1]; const t = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"]; if (m >= 0 && m < 12) return `${t[m]} ${y}`; } return mm_yyyy; }
        const parseDateForFilter=(s)=>{if(!s||String(s).trim()==='-'||String(s).trim()==='')return null;let c=String(s).trim();const p=c.split(/[\/\-]/);if(p.length===3){let d=parseInt(p[0],10),m=parseInt(p[1],10)-1,y=parseInt(p[2],10);if(p[0].length===4){y=parseInt(p[0],10);m=parseInt(p[1],10)-1;d=parseInt(p[2],10);}if(y<100)y+=y>40?2500:2000;if(y>=2400)y-=543;let dObj=new Date(y,m,d);if(!isNaN(dObj.getTime()))return dObj.getTime();}const tS=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'],tF=['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'],tM=c.match(/(\d{1,2})\s+([ก-๙\.]+)\s+(\d{2,4})/);if(tM){let d=parseInt(tM[1],10),mo=tM[2],y=parseInt(tM[3],10),m=tS.findIndex(t=>mo.includes(t));if(m===-1)m=tF.findIndex(t=>mo.includes(t));if(m===-1)m=0;if(y<100)y+=y>40?2500:2000;if(y>=2400)y-=543;return new Date(y,m,d).getTime();}if(!isNaN(c)&&Number(c)>10000)return new Date(Date.UTC(1899,11,30)).getTime()+Number(c)*86400000;let dObj=new Date(c);return isNaN(dObj.getTime())?null:dObj.getTime();};
        function formatThaiDate(v,s=false){if(!v)return '-';let d,m,y;if(typeof v==='number'){const doObj=new Date(new Date(Date.UTC(1899,11,30)).getTime()+v*86400000);d=doObj.getUTCDate();m=doObj.getUTCMonth()+1;y=doObj.getUTCFullYear();if(y<2500)y+=543;}else{let ds=String(v).trim();const p=ds.split(/[-/]/);if(p.length===3){d=parseInt(p[0]);m=parseInt(p[1]);y=parseInt(p[2]);if(p[0].length===4){y=parseInt(p[0]);m=parseInt(p[1]);d=parseInt(p[2]);}if(!isNaN(d)&&!isNaN(m)&&!isNaN(y)){if(y<100)y+=y>=50?2500:2000;if(y<2500)y+=543;}else return ds;}else return ds;}return `${String(d).padStart(2,'0')}/${String(m).padStart(2,'0')}/${s?String(y).slice(-2):y}`;}
        function filterDropdownOptions(i,t){const c=document.getElementById(i);if(!c)return;const ls=c.getElementsByTagName('label'),f=t.toLowerCase().replace(/\s+/g,'');for(let j=0;j<ls.length;j++){const s=ls[j].querySelector('span');if(s)ls[j].style.display=(s.textContent||s.innerText).toLowerCase().replace(/\s+/g,'').indexOf(f)>-1?"":"none";}}

        function toggleReport7HDropdown() { report7HDropdownOpen = !report7HDropdownOpen; const dd = document.getElementById('catDropdown7H'); if (dd) report7HDropdownOpen ? dd.classList.remove('hidden') : dd.classList.add('hidden'); }
        
        function updateDataDisplay7H() {
            const container = document.getElementById('tableDataContainer7H');
            if (container) {
                container.innerHTML = generateTableHTML7H();
            }
            const btnSpan = document.querySelector('#catDropdownBtn7H span');
            if (btnSpan) {
                btnSpan.textContent = selectedCategories_forReport7H.length > 0 ? selectedCategories_forReport7H.join(', ') : '-- กรุณาเลือกหมวดหมู่ --';
            }
            const checkboxes = document.querySelectorAll('#catListContainer7H input[type="checkbox"]');
            checkboxes.forEach(cb => {
                cb.checked = selectedCategories_forReport7H.includes(cb.value);
            });
        }

        function selectAllCategories7H() { selectedCategories_forReport7H = [...currentAvailableCategories7H]; updateDataDisplay7H(); }
        function clearAllCategories7H() { selectedCategories_forReport7H = []; updateDataDisplay7H(); }
        function updateReport7HCategoryFilter(val, isChecked) { if (isChecked) { if (!selectedCategories_forReport7H.includes(val)) selectedCategories_forReport7H.push(val); } else { selectedCategories_forReport7H = selectedCategories_forReport7H.filter(item => item !== val); } updateDataDisplay7H(); }
        function updateReport7HDates(type, val) { if (type === 'receive_start') startDate_receive_forReport7H = val; if (type === 'receive_end') endDate_receive_forReport7H = val; if (type === 'pay_start') startDate_pay_forReport7H = val; if (type === 'pay_end') endDate_pay_forReport7H = val; updateDataDisplay7H(); }

        window.addEventListener('click', function(e) {
            const dd = document.getElementById('catDropdown7H'), btn = document.getElementById('catDropdownBtn7H');
            if (dd && btn && report7HDropdownOpen && !dd.contains(e.target) && !btn.contains(e.target)) { report7HDropdownOpen = false; dd.classList.add('hidden'); }
        });

        function handleHistorySelect7H(url) {
            selectedHistoryUrl7H = url;
            if (!url) { appData7H = []; renderReport7_History(document.getElementById('contentContainer')); return; }
            isLoadingData7H = true; renderReport7_History(document.getElementById('contentContainer'));
            let fetchUrl = url; if(fetchUrl.includes('pubhtml')) fetchUrl = fetchUrl.replace('pubhtml', 'pub').split('?')[0] + '?output=csv';
            Papa.parse(fetchUrl, {
                download: true, header: false,
                complete: function(results) {
                    if(results.data.length < 5) { appData7H = []; }
                    else {
                        appData7H = results.data.slice(4).filter(row => row.length > 0 && row.some(cell => cell !== ""));
                        window.report7HInitialized = false; 
                        startDate_receive_forReport7H = ""; endDate_receive_forReport7H = ""; startDate_pay_forReport7H = ""; endDate_pay_forReport7H = "";
                    }
                    isLoadingData7H = false; renderReport7_History(document.getElementById('contentContainer'));
                }, error: function() { appData7H = []; isLoadingData7H = false; renderReport7_History(document.getElementById('contentContainer')); }
            });
        }

        function generateTableHTML7H() {
            const selectedItem = historyList7H.find(h => h.url === selectedHistoryUrl7H);
            const printTitle = `รายงานเจ้าหนี้แยกประเภท เดือน ${getThaiMonthYear(selectedItem ? selectedItem.name : "")}`;

            const companyGroups = {};
            let sumGrandE = 0, sumGrandF = 0, sumGrandG = 0, sumGrandH = 0;

            appData7H.forEach(row => {
                if (parseNumberValue(row[4]) === 0 && parseNumberValue(row[5]) === 0 && parseNumberValue(row[6]) === 0 && parseNumberValue(row[7]) === 0) return;
                let cat = String(row[12] || '').trim() || 'ไม่ระบุหมวดหมู่';
                if (selectedCategories_forReport7H.length > 0 && !selectedCategories_forReport7H.includes(cat)) return;
                
                const rec = parseDateForFilter(row[1]), pay = parseDateForFilter(row[8]);
                if (startDate_receive_forReport7H) { const sDate = new Date(startDate_receive_forReport7H); sDate.setHours(0,0,0,0); if (!rec || rec < sDate.getTime()) return; }
                if (endDate_receive_forReport7H) { const eDate = new Date(endDate_receive_forReport7H); eDate.setHours(23,59,59,999); if (!rec || rec > eDate.getTime()) return; }
                if (startDate_pay_forReport7H) { const sDate = new Date(startDate_pay_forReport7H); sDate.setHours(0,0,0,0); if (!pay || pay < sDate.getTime()) return; }
                if (endDate_pay_forReport7H) { const eDate = new Date(endDate_pay_forReport7H); eDate.setHours(23,59,59,999); if (!pay || pay > eDate.getTime()) return; }

                const comp = String(row[2]||'').trim() || 'ไม่ระบุบริษัท';

                if (!companyGroups[comp]) companyGroups[comp] = {};
                if (!companyGroups[comp][cat]) companyGroups[comp][cat] = { e: 0, f: 0, g: 0, h: 0 };
                
                companyGroups[comp][cat].e += parseNumberValue(row[4]);
                companyGroups[comp][cat].f += parseNumberValue(row[5]);
                companyGroups[comp][cat].g += parseNumberValue(row[6]);
                companyGroups[comp][cat].h += parseNumberValue(row[7]);
                
                sumGrandE += parseNumberValue(row[4]);
                sumGrandF += parseNumberValue(row[5]);
                sumGrandG += parseNumberValue(row[6]);
                sumGrandH += parseNumberValue(row[7]);
            });

            // เรียงลำดับตามชื่อบริษัท
            const sortedComps = Object.keys(companyGroups).sort((a, b) => a.localeCompare(b, 'th'));

            let tableHTML = `<h3 class="text-xl font-bold text-center mb-4 print-only">${printTitle}</h3>`;
            tableHTML += `
                <div class="overflow-x-auto overflow-y-auto max-h-[600px] bg-white rounded-lg border border-gray-200 shadow-sm flex justify-center relative">
                    <table class="min-w-full text-sm text-left whitespace-nowrap print-fixed-table">
                        <thead class="bg-blue-50 text-blue-900 border-b border-gray-200 sticky top-0 z-10 shadow-sm outline outline-1 outline-gray-200">
                            <tr>
                                <th class="px-4 py-3 font-semibold text-center w-12 bg-blue-50">ลำดับ</th>
                                <th class="px-4 py-3 font-semibold text-center bg-blue-50" style="width: 50mm; min-width: 50mm; max-width: 50mm;">บริษัท/หจก/ร้าน</th>
                                <th class="px-4 py-3 font-semibold text-center bg-blue-50" style="width: 60mm; min-width: 60mm;">หมวดหมู่</th>
                                <th class="px-4 py-3 font-semibold text-center bg-blue-50" style="width: 20mm; min-width: 20mm;">จำนวนเงิน</th>
                                <th class="px-4 py-3 font-semibold text-center bg-blue-50" style="width: 20mm; min-width: 20mm;">จ่าย</th>
                                <th class="px-4 py-3 font-semibold text-center bg-blue-50" style="width: 20mm; min-width: 20mm;">ปรับปรุง</th>
                                <th class="px-4 py-3 font-semibold text-center bg-blue-50" style="width: 20mm; min-width: 20mm;">คงเหลือ</th>
                            </tr>
                        </thead>
            `;

            if (sortedComps.length === 0) {
                tableHTML += `<tbody><tr><td colspan="7" class="px-4 py-8 text-center text-gray-500 border-b border-gray-200">ไม่พบข้อมูลตามเงื่อนไขที่เลือก</td></tr></tbody>`;
            } else {
                tableHTML += `<tbody>`;
                let index = 1;
                
                sortedComps.forEach(comp => {
                    const cats = Object.keys(companyGroups[comp]).sort((a, b) => a.localeCompare(b, 'th'));
                    const showSubtotal = true; // แสดงบรรทัดรวมยอดทุกบริษัทเสมอ
                    const rowCount = cats.length + (showSubtotal ? 1 : 0);
                    
                    let compSumE = 0, compSumF = 0, compSumG = 0, compSumH = 0;

                    cats.forEach((cat, catIdx) => {
                        const isFirstRow = catIdx === 0;
                        const trClass = isFirstRow ? "border-t border-gray-300 hover:bg-gray-50" : "border-t border-gray-100 border-dashed hover:bg-gray-50";
                        
                        compSumE += companyGroups[comp][cat].e;
                        compSumF += companyGroups[comp][cat].f;
                        compSumG += companyGroups[comp][cat].g;
                        compSumH += companyGroups[comp][cat].h;

                        tableHTML += `<tr class="${trClass}">`;
                        
                        if (isFirstRow) {
                            tableHTML += `<td class="px-4 py-3 text-center text-gray-600 align-top border-r border-gray-200 bg-white" rowspan="${rowCount}">${index++}</td>`;
                            tableHTML += `<td class="px-4 py-3 text-gray-800 align-top border-r border-gray-200 bg-white" style="max-width: 50mm; white-space: normal; word-break: break-word;" rowspan="${rowCount}">${comp}</td>`;
                        }

                        tableHTML += `<td class="px-4 py-2 text-gray-800 whitespace-normal align-top" style="min-width: 60mm;">${cat}</td>`;
                        tableHTML += `<td class="px-4 py-2 text-right text-gray-800 align-top">${formatNumber(companyGroups[comp][cat].e)}</td>`;
                        tableHTML += `<td class="px-4 py-2 text-right text-gray-800 align-top">${formatNumber(companyGroups[comp][cat].f)}</td>`;
                        tableHTML += `<td class="px-4 py-2 text-right text-gray-800 align-top">${formatNumber(companyGroups[comp][cat].g)}</td>`;
                        tableHTML += `<td class="px-4 py-2 text-right text-blue-700 font-semibold align-top">${formatNumber(companyGroups[comp][cat].h)}</td>`;
                        tableHTML += `</tr>`;
                    });

                    if (showSubtotal) {
                        tableHTML += `<tr class="bg-blue-50 border-t border-blue-200 font-semibold text-gray-800">`;
                        tableHTML += `<td class="px-4 py-2 text-right align-top">รวมยอดบริษัท</td>`;
                        tableHTML += `<td class="px-4 py-2 text-right text-gray-900 align-top">${formatNumber(compSumE)}</td>`;
                        tableHTML += `<td class="px-4 py-2 text-right text-gray-900 align-top">${formatNumber(compSumF)}</td>`;
                        tableHTML += `<td class="px-4 py-2 text-right text-gray-900 align-top">${formatNumber(compSumG)}</td>`;
                        tableHTML += `<td class="px-4 py-2 text-right text-blue-800 align-top">${formatNumber(compSumH)}</td>`;
                        tableHTML += `</tr>`;
                    }
                });
                tableHTML += `</tbody>`;

                tableHTML += `
                    <tfoot class="bg-gray-200 border-t-4 border-gray-300 font-bold text-gray-900">
                        <tr>
                            <td colspan="3" class="px-4 py-3 text-right text-lg border-r border-gray-300">รวมยอดทั้งสิ้น</td>
                            <td class="px-4 py-3 text-right text-lg">${formatNumber(sumGrandE)}</td>
                            <td class="px-4 py-3 text-right text-lg">${formatNumber(sumGrandF)}</td>
                            <td class="px-4 py-3 text-right text-lg">${formatNumber(sumGrandG)}</td>
                            <td class="px-4 py-3 text-right text-lg text-blue-900">${formatNumber(sumGrandH)}</td>
                        </tr>
                    </tfoot>`;
            }
            tableHTML += `</table></div>`;
            return tableHTML;
        }

        function renderReport7_History(container) {
            if (historyList7H.length === 0 && !isLoadingHistory7H) {
                isLoadingHistory7H = true; container.innerHTML = '<div class="text-center text-gray-500 py-8">กำลังดึงข้อมูลรายชื่อย้อนหลัง...</div>';
                Papa.parse(HISTORY_SHEET_CSV_URL, {
                    download: true, header: false,
                    complete: function(results) {
                        isLoadingHistory7H = false;
                        const validData = results.data.slice(1).filter(row => row.length >= 2 && row[0] && String(row[0]).trim() !== '');
                        historyList7H = validData.map(row => ({ name: String(row[0]).trim(), url: extractUrlFromEmbed(row[1]) })).filter(item => item.url.startsWith('http'));
                        renderReport7_History(container);
                    }, error: function() { isLoadingHistory7H = false; container.innerHTML = '<div class="text-center text-red-500 py-8">ไม่สามารถโหลดรายการได้</div>'; }
                }); return;
            }

            let headerDropdownHTML = `
                <div class="flex flex-col mb-6 gap-4 no-print">
                    <h3 class="text-2xl font-bold text-gray-800">13. รายงานเจ้าหนี้แยกประเภท รายตัว ย้อนหลัง</h3>
                    <div class="bg-white p-4 rounded-lg border border-gray-200 shadow-sm w-full flex flex-col sm:flex-row items-start sm:items-center gap-3">
                        <label class="text-gray-700 font-medium whitespace-nowrap">เลือกเดือน:</label>
                        <select onchange="handleHistorySelect7H(this.value)" class="border border-gray-300 rounded-lg px-4 py-2 outline-none w-full sm:w-80 cursor-pointer">
                            <option value="">-- กรุณาเลือกข้อมูลย้อนหลัง --</option>
                            ${historyList7H.map(h => `<option value="${h.url}" ${selectedHistoryUrl7H === h.url ? 'selected' : ''}>${h.name}</option>`).join('')}
                        </select>
                    </div>
                </div>
            `;

            let contentHTML = '';
            if (isLoadingData7H) contentHTML = '<div class="text-center text-blue-500 py-8">กำลังโหลดข้อมูลรายงาน...</div>';
            else if (appData7H.length > 0) {
                const selectedItem = historyList7H.find(h => h.url === selectedHistoryUrl7H);
                const printTitle = `รายงานเจ้าหนี้แยกประเภท เดือน ${getThaiMonthYear(selectedItem ? selectedItem.name : "")}`;

                const uniqueCategoriesSet = new Set();
                appData7H.forEach(row => {
                    if (parseNumberValue(row[4]) === 0 && parseNumberValue(row[5]) === 0 && parseNumberValue(row[6]) === 0 && parseNumberValue(row[7]) === 0) return;
                    uniqueCategoriesSet.add(String(row[12] || '').trim() || 'ไม่ระบุหมวดหมู่');
                });
                currentAvailableCategories7H = [...uniqueCategoriesSet].sort();

                if (!window.report7HInitialized) { selectedCategories_forReport7H = []; window.report7HInitialized = true; }

                let controlHTML = `
                    <div class="flex flex-col justify-between items-start mb-6 gap-4 no-print border-t border-gray-200 pt-6">
                        <div class="w-full flex flex-col md:flex-row justify-between items-start md:items-end gap-4">
                            <div class="flex-1 w-full">
                                <h4 class="text-xl font-bold text-gray-700 mb-3">9.1 แบบรายงานเจ้าหนี้แยกประเภท เดือนเก่า</h4>
                                <div class="bg-gray-50 p-4 rounded-lg border border-gray-200 shadow-sm space-y-4">
                                    <div class="flex flex-col sm:flex-row items-start sm:items-center gap-3">
                                        <label class="text-gray-700 font-medium min-w-[120px]">เลือกค่า (หมวดหมู่):</label>
                                        <div class="relative inline-block text-left w-full sm:w-auto">
                                            <button type="button" id="catDropdownBtn7H" onclick="toggleReport7HDropdown()" class="border border-gray-300 rounded-lg px-4 py-2 bg-white text-gray-800 shadow-sm flex items-center justify-between w-full sm:w-80 outline-none">
                                                <span class="truncate">${selectedCategories_forReport7H.length > 0 ? selectedCategories_forReport7H.join(', ') : '-- กรุณาเลือกหมวดหมู่ --'}</span>
                                            </button>
                                            <div id="catDropdown7H" class="${report7HDropdownOpen ? '' : 'hidden'} origin-top-right absolute left-0 mt-2 w-full sm:w-80 rounded-md shadow-lg bg-white ring-1 ring-black ring-opacity-5 z-20">
                                                <div class="sticky top-0 z-10 bg-white rounded-t-md shadow-sm">
                                                    <div class="px-3 py-2 border-b border-gray-200 flex justify-between bg-gray-50"><button type="button" onclick="selectAllCategories7H()" class="text-xs font-semibold text-blue-600">เลือกทั้งหมด</button><button type="button" onclick="clearAllCategories7H()" class="text-xs font-semibold text-red-600">ล้าง</button></div>
                                                    <div class="p-2 border-b border-gray-200"><input type="text" placeholder="พิมพ์ค้นหาค่า..." oninput="filterDropdownOptions('catListContainer7H', this.value)" class="w-full border border-gray-300 rounded px-2 py-1.5 text-sm outline-none"></div>
                                                </div>
                                                <div id="catListContainer7H" class="py-1 max-h-48 overflow-y-auto px-3">
                                                    ${currentAvailableCategories7H.length > 0 ? currentAvailableCategories7H.map(cat => `<label class="flex items-center py-2 cursor-pointer border-b border-gray-100 last:border-0"><input type="checkbox" value="${cat}" ${selectedCategories_forReport7H.includes(cat) ? 'checked' : ''} onchange="updateReport7HCategoryFilter(this.value, this.checked)" class="w-4 h-4 text-blue-600 border-gray-300 rounded mr-3"><span class="text-sm text-gray-700">${cat}</span></label>`).join('') : '<div class="py-2 text-sm text-gray-500">ไม่พบหมวดหมู่</div>'}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <hr class="border-gray-200">
                                    <div class="flex flex-col lg:flex-row gap-4 lg:items-center">
                                        <div class="flex flex-col sm:flex-row items-start sm:items-center gap-2 flex-1">
                                            <label class="text-gray-700 font-medium min-w-[120px] text-sm">วันที่ตรวจรับ (ตั้งแต่):</label>
                                            <input type="date" value="${startDate_receive_forReport7H}" onchange="updateReport7HDates('receive_start', this.value)" class="border border-gray-300 rounded px-2 py-1.5 outline-none w-full sm:w-auto text-sm">
                                            <label class="text-gray-700 font-medium mx-1 text-sm">ถึง:</label>
                                            <input type="date" value="${endDate_receive_forReport7H}" onchange="updateReport7HDates('receive_end', this.value)" class="border border-gray-300 rounded px-2 py-1.5 outline-none w-full sm:w-auto text-sm">
                                        </div>
                                        <div class="hidden lg:block w-px h-8 bg-gray-300 mx-2"></div>
                                        <div class="flex flex-col sm:flex-row items-start sm:items-center gap-2 flex-1">
                                            <label class="text-gray-700 font-medium min-w-[120px] text-sm">วันที่ชำระ (ตั้งแต่):</label>
                                            <input type="date" value="${startDate_pay_forReport7H}" onchange="updateReport7HDates('pay_start', this.value)" class="border border-gray-300 rounded px-2 py-1.5 outline-none w-full sm:w-auto text-sm">
                                            <label class="text-gray-700 font-medium mx-1 text-sm">ถึง:</label>
                                            <input type="date" value="${endDate_pay_forReport7H}" onchange="updateReport7HDates('pay_end', this.value)" class="border border-gray-300 rounded px-2 py-1.5 outline-none w-full sm:w-auto text-sm">
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <button onclick="window.print()" class="bg-gray-800 hover:bg-gray-700 text-white px-4 py-2 rounded shadow flex items-center gap-2 mt-4 md:mt-0 h-fit"><svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" /></svg> พิมพ์รายงาน</button>
                        </div>
                    </div>
                `;

                contentHTML = controlHTML + '<div id="tableDataContainer7H">' + generateTableHTML7H() + '</div>';

            } else if (selectedHistoryUrl7H !== "") {
                contentHTML = '<div class="text-center text-gray-500 py-8">ไม่พบข้อมูล หรือข้อมูลไม่ถูกต้อง</div>';
            } else {
                contentHTML = `<div class="text-center text-gray-400 mt-10 no-print border-t border-gray-200 pt-10"><p class="text-lg">กรุณาเลือกข้อมูลย้อนหลังจากดรอปดาวน์ด้านบน</p></div>`;
            }

            container.innerHTML = headerDropdownHTML + contentHTML;
        }

        // Init
        document.addEventListener('DOMContentLoaded', () => { renderReport7_History(document.getElementById('contentContainer')); });
    </script>
</body>
</html>
